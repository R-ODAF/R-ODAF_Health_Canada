#### Main parameters

common:
  projectdir: null # Use when loading. If null, here::here() will be used. Can also hard code if for some reason you need that
  project_title: "Test"    # Change depending on your project name
  researcher_name: "Name" # Name of the researcher leading the project
  bioinformatician_name: "Name" # Name of the person running the R-ODAF analyses
  metadata_file: "metadata.txt" # Name of the metadata file. Must be in inputs/metadata/ 
  contrasts_file: "contrasts.txt" # Name of the contrasts file. Must be in inputs/contrasts/
  project_description: null # description of project for report, optional
  batch_var: "batch"          # For example, multiple plates
  dose: "dose"               # If there is a dose in the experiment; otherwise use NULL
  platform: "DRUG-Seq"       # One of: DRUG-Seq, TempO-Seq, or RNA-Seq
  nmr_threshold: 100000    # 10% of aimed-for depth per sample. Ex. 1M reads for TempOSeq = nmr_threshold of 100000; 10% of 10M reads for RNA-Seq = 1000000.
  write_additional_output: TRUE # export BMD, biomarker, and biosets output? facet variable should contain chemical and timepoint information
  celltype: "MCF7" # only required for biosets output. Cell type or species used
  units: "uM" # only required for biosets output. Units of dose
  solvent_control: "solvent_control"
  biospyder_dbs: "~/shared/dbs/biospyder/" # Path to location of biospyder manifest file. Only needed if platform = TempO-Seq. Otherwise, set to null.
  biospyder_manifest_file:  "181019_Human_S1500_Surrogate_1.2_Manifest.txt" # Only needed if platform = TempO-Seq. Otherwise, set to null.

pipeline:
  sample_id: "sample_ID" # header for the column for sample identifier in the metadata file
  library_id: "library_ID" # header for the column for library identifier in the metadata file
  sample_barcode: "sample_barcode" # header for the column containing sample barcodes
  mode: "pe" # paired end for DRUG-seq
  threads: 8 # number of threads to use for multi-threaded programs
  max_memory: 100000000000 # In bytes (1 GB = 1000000000 bytes) . Total RAM that can be used by STAR

  # Reference genome
  genomedir: /home/bradford/storage/dbs/GRCh38  # Directory where genome information can be found (the files below should be in this directory)
  genome_filename: Homo_sapiens.GRCh38.dna.primary_assembly.fa # Genome fasta filename
  annotation_filename: Homo_sapiens.GRCh38.108.gtf # Genome gtf filename
  genome_name: "GRCh38_drugseq" # Used for labeling genome index files

  # DRUG-seq only parameters (leave null for RNA-seq and TempOseq)
  include_ercc: TRUE # TRUE to quantify reads aligning to ERCC spike-ins. If TRUE, the ercc files below are required.
  erccdir: "/home/bradford/storage/dbs/ERCC_spikein" # Location of the ERCC fasta and gtf files
  ercc_fasta: "ERCC92.fa"
  ercc_gtf: "ERCC92.gtf"
  umi_dedup_method: "NoDedup 1MM_Directional 1MM_Directional_UMItools 1MM_All 1MM_CR Exact" # UMI deduplication method(s), separated with spaces. MUST include NoDedup. Options are: NoDedup 1MM_Directional 1MM_Directional_UMItools 1MM_All 1MM_CR Exact
  umi_method_definitive: "1MM_Directional" # Choose ONLY ONE of the UMI methods specified in umi_dedup_method. The counts will be combined into a studywide count table used for QC and downstream steps.

###### QC parameters
QC:
  clust_method: "spearman" # For clustering
  studywide_tree_height_cutoff: 0.1  # For clustering
  group_tree_height_cutoff: null # cluster by treatment_var groups and remove samples branching above this height. Can be set to null to skip this QC step
  dendro_color_by: "group" # Specify how you would like to color the dendrograms
  align_threshold: 0.5     # 50% alignment rate for TempO-Seq Experiments
  gini_cutoff: 0.95 # Default 0.95 for TempO-seq, 0.99 for RNA-seq
  exp_groups: # These columns must exist in the metadata file. Used for plotting in QC report
    one: ["chemical", "dose"]
    two: ["I7_Index_ID", "I5_Index_ID"] 
    three: ["row", "column"]
      #4: ["batch"]
      #As many groups as desired...up to a maximum of 6
  treatment_var: "chemical" # A column name from your metadata that represents the treatment
  collapse_replicates: F # Set to true if you have replicate flow cells that need to be summed into a single value
  # Column names for metadata, if applicable
  technical_control: "technical_control"
  reference_rna: "reference_rna"

  
###### DESeq2 parameters
DESeq2:
  analysis_name: "default"  # short string identifying analysis settings. This will appear in the analysis directory and file names
  species: "human"                 # one of human, mouse, rat, hamster
  design: "group"                # single experimental group of interest; entries in this column must match the contrast names.
  intgroup_to_plot: "group" # for PCA plots, add tabs for one or more groups to color
  formula_override: null # e.g., "~batch + condition", to enable users to specify the DESeq2 formula to use
  deseq_facet: "chemical"       # If you have many different experimental groups, you may subset the report by specifying a column in the metadata to filter groups, and then setting the group of interest in deseq_filter
  deseq_filter:  null        # Which group will this report be done on?
  reports_facet: "chemical" #  Separate reports will be made for each facet
  reports_filter:  null # You can choose just one group within the column used for reports_facet, and produce reports only for that group
  sortcol: "dose"                # Optionally, a column by which to sort the contrasts
  lenient_contrasts: FALSE         # Use either column (exp, cont) of contrasts file to limit what is included in the report (instead of just exp column)
  strict_contrasts: FALSE         # Use BOTH columns (exp, cont) of contrasts file to limit what is included in the report
  exclude_samples: null      # Optionally, a vector of sample names to exclude from the analysis
  exclude_groups: null       # Optionally, a vector of groups to exclude from the analysis. By default this is assumed to be in the column specified by params$design.
  include_only_column:  null # Restrict analysis to group(s) in the column listed here based on params$include_only_group.
  include_only_group:  null  # Restrict analysis to this/these group(s) within the column listed in params$include_only_column
  cpus: 41                       # Set to a lower number (e.g., 2 to 4) if you aren't working in a server environment
  run_pathway_analysis: TRUE     # Optionally disable pathway analysis if not available for your organism
  wikipathways_directory: "~/shared/dbs/wikipathways" # Used for pathway analysis
  wikipathways_filename: "wikipathways-20210810-gmt-Homo_sapiens.gmt"
  linear_fc_filter_DEGs: 1.5 # Default 1.5
  linear_fc_filter_biosets: 1.2 # Default 1.2. Used for biosets output when write_additional_output=True  
  # "wikipathways-20210810-gmt-Mus_musculus.gmt"
  # "wikipathways-20210810-gmt-Rattus_norvegicus.gmt"
  nBestFeatures: 20              # The number of best features to make plots of their counts
  nBest: 100                     # Number of features to include in table and limiting PCA/clustering analysis
  nHeatmap: 50                   # Number of most variable genes for heatmap
  nHeatmapDEGs: 50               # Number of DEGs for heatmap
  cooks: FALSE                   # the DESeq Cook's distance cutoff, or FALSE to disable it
  filter_gene_counts: FALSE      # Filter genes to those with at least 1 count in 1 sample. Disabled by default for biomarker file output. Can enable to increase speed of analysis
  generate_main_report: TRUE
  generate_stats_report: TRUE
  generate_data_explorer_report: TRUE
  generate_go_pathway_report: TRUE
  generate_tgxddi_report: FALSE
  generate_tgxhdaci_report: FALSE
  generate_summary_report: TRUE
  generate_runningfisher_report: TRUE
  output_digits: 5 # control rounding of DEG output. Primarily used to suppress RNG variability so our tests don't fail :)
  parallel: FALSE
  